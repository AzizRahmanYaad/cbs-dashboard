<div
  class="modal-backdrop"
  *ngIf="open"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-modal="true"
  aria-labelledby="profile-modal-title"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="profile-modal-title" class="modal-title">Update Profile</h2>
        <button
          type="button"
          class="modal-close"
          (click)="close()"
          aria-label="Close"
          [disabled]="isLoading"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="modal-body">
        <div class="form-group">
          <label for="profile-fullName" class="form-label">Full Name</label>
          <input
            type="text"
            id="profile-fullName"
            formControlName="fullName"
            class="form-input"
            placeholder="Enter your full name"
            [class.error]="fullNameControl?.invalid && fullNameControl?.touched"
          />
          <div class="error-message" *ngIf="fullNameControl?.invalid && fullNameControl?.touched">
            Full name is required (max 200 characters).
          </div>
        </div>

        <div class="password-section">
          <h3 class="password-section-title">Change Password</h3>
          <p class="password-section-hint">Leave blank to keep your current password.</p>

          <div class="form-group">
            <label for="profile-currentPassword" class="form-label">Current Password</label>
            <div class="input-with-toggle">
              <input
                [type]="showCurrentPassword ? 'text' : 'password'"
                id="profile-currentPassword"
                formControlName="currentPassword"
                class="form-input"
                placeholder="Enter current password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="toggleCurrentPassword()"
                aria-label="Toggle current password visibility"
              >
                <svg *ngIf="!showCurrentPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showCurrentPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div class="error-message" *ngIf="wantsToChangePassword && currentPasswordControl?.value && !currentPasswordControl?.value.trim()">
              Current password is required when changing password.
            </div>
          </div>

          <div class="form-group">
            <label for="profile-newPassword" class="form-label">New Password</label>
            <div class="input-with-toggle">
              <input
                [type]="showNewPassword ? 'text' : 'password'"
                id="profile-newPassword"
                formControlName="newPassword"
                class="form-input"
                placeholder="At least 6 characters"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="toggleNewPassword()"
                aria-label="Toggle new password visibility"
              >
                <svg *ngIf="!showNewPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showNewPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div class="error-message" *ngIf="newPasswordControl?.value && newPasswordControl?.value.length > 0 && newPasswordControl?.value.length < 6">
              New password must be at least 6 characters.
            </div>
          </div>

          <div class="form-group">
            <label for="profile-confirmNewPassword" class="form-label">Confirm New Password</label>
            <div class="input-with-toggle">
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                id="profile-confirmNewPassword"
                formControlName="confirmNewPassword"
                class="form-input"
                placeholder="Confirm new password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="toggleConfirmPassword()"
                aria-label="Toggle confirm password visibility"
              >
                <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div
              class="error-message"
              *ngIf="
                newPasswordControl?.value &&
                confirmNewPasswordControl?.value &&
                newPasswordControl?.value !== confirmNewPasswordControl?.value
              "
            >
              Passwords do not match.
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" (click)="close()" [disabled]="isLoading">
            Cancel
          </button>
          <button type="submit" class="btn-primary" [disabled]="isLoading">
            <span *ngIf="!isLoading">Save Changes</span>
            <span *ngIf="isLoading" class="loading-text">Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
