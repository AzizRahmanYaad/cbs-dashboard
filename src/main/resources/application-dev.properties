server.port=8090
server.address=0.0.0.0
spring.application.name=CBS-Dashboard

# PostgreSQL (local Docker on host port 5443)
# This matches the settings in application.properties so the "dev" profile
# works on this server without relying on PG* environment variables.
spring.datasource.url=jdbc:postgresql://localhost:5443/cbs_dashboard
spring.datasource.username=cbs_user
spring.datasource.password=admin123

# JPA/Hibernate (show-sql=true only when debugging DB issues)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=Y0JzRGFzaGJvYXJkU2VjcmV0S2V5Rm9yUHJvZHVjdGlvbjIwMjVDaGFuZ2VUaGlzSW5Qcm9kdWN0aW9u
jwt.expiration=3600000
jwt.refresh-expiration=86400000
