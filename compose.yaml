services:
  postgres:
    image: 'postgres:latest'
    container_name: cbs-dashboard-postgres
    environment:
      - 'POSTGRES_DB=cbs_dashboard'
      - 'POSTGRES_PASSWORD=admin123'
      - 'POSTGRES_USER=cbs_user'
    ports:
      - '5442:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbs_user -d cbs_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
